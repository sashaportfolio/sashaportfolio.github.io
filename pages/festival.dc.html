<style id="__resp">
@media (max-width: 760px){
  body{overflow-x:hidden;}

  /* case covers: vertical, two per row */

}
</style>
<style id="__anim">
@keyframes moveOutLeft{from{transform:translateX(0);opacity:1;}to{transform:translateX(-80px);opacity:0;}}
.page-exit{animation:moveOutLeft 300ms ease-out forwards;}
</style>
<script>
(function(){
  document.addEventListener('click',function(e){
    var a=e.target.closest&&e.target.closest('a[href]');
    if(!a)return;
    var href=a.getAttribute('href');
    if(!href||href.charAt(0)==='#')return;
    if(a.target==='_blank'||/^(https?:|mailto:|tel:)/i.test(href))return;
    e.preventDefault();
    document.body.classList.add('page-exit');
    setTimeout(function(){window.location.href=href;},300);
  },true);
  // Back/forward (incl. mobile bfcache restore): clear the exit animation so the restored page shows normally
  window.addEventListener('pageshow',function(){document.body.classList.remove('page-exit');});
})();
</script>
